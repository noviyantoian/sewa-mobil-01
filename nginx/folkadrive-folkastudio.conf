# Worked example — folkadrive.folkastudio.com on port 39001.
# Copy to /etc/nginx/sites-available/folkadrive-folkastudio.conf, enable, then:
#   sudo certbot --nginx -d folkadrive.folkastudio.com

server {
    listen 80;
    listen [::]:80;
    server_name folkadrive.folkastudio.com;

    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:39001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
